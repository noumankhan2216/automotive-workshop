services:
  postgres:
    image: postgres:16-alpine
    container_name: aw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: automotive_workshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: aw-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=automotive_workshop;Username=postgres;Password=postgres"
      Jwt__Secret: "dev-secret-key-minimum-32-characters-long-for-jwt-signing"
      Cors__Origins__0: "http://localhost:4200"
    ports:
      - "5001:8080"

volumes:
  postgres_data:
