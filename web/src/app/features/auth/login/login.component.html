<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <mat-icon>garage</mat-icon>
      </div>
      <h1>AutoWorks</h1>
      <p>Sign in to manage your workshop</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <mat-icon matPrefix>mail</mat-icon>
        <input matInput type="email" formControlName="email" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock</mat-icon>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
      </mat-form-field>

      @if (error()) {
        <div class="login-error">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="loading()" class="login-submit">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="login-hint">Demo: admin&#64;workshop.local · Admin123!</p>
  </div>
</div>
