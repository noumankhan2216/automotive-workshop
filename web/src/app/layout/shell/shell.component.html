<mat-sidenav-container class="shell" [class.shell--collapsed]="collapsed()">
  <mat-sidenav
    #sidenav
    class="shell__sidenav"
    [mode]="collapsed() ? 'over' : 'side'"
    [opened]="!collapsed()"
    [fixedInViewport]="collapsed()">
    <div class="shell__brand">
      <div class="shell__logo">
        <mat-icon>garage</mat-icon>
      </div>
      <div class="shell__brand-text">
        <span class="shell__brand-title">AutoWorks</span>
        <span class="shell__brand-sub">Workshop Manager</span>
      </div>
    </div>

    <mat-nav-list class="shell__nav">
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active"
           (click)="collapsed() && sidenav.close()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="shell__sidefoot">
      <div class="shell__avatar">{{ initials() }}</div>
      <div class="shell__userblock">
        <span class="shell__username">{{ auth.currentUser()?.fullName }}</span>
        <span class="shell__userrole">{{ auth.currentUser()?.roles?.[0] || 'User' }}</span>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="shell__toolbar">
      @if (collapsed()) {
        <button mat-icon-button class="shell__menu" aria-label="Toggle navigation"
                (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <nav class="shell__crumbs" aria-label="Breadcrumb">
        <mat-icon class="shell__crumb-home">home</mat-icon>
        <span class="shell__crumb-sep">/</span>
        <span class="shell__crumb-active">{{ activeLabel() }}</span>
      </nav>
      <span class="spacer"></span>
      <span class="shell__user">{{ auth.currentUser()?.fullName }}</span>
      <button mat-stroked-button class="shell__logout" (click)="auth.logout()">
        <mat-icon>logout</mat-icon>
        <span class="shell__logout-text">Logout</span>
      </button>
    </mat-toolbar>
    <main class="shell__content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
